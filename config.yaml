render:
  engine: CYCLES
  device: GPU                  # GPU or CPU
  compute_device_type: CUDA    # CUDA (NVIDIA), OPTIX (NVIDIA RTX), HIP (AMD), METAL (Apple)
  samples: 20
  use_denoiser: true
  denoiser: OPENIMAGEDENOISE   # or OPTIX for NVIDIA
  denoiser_use_gpu: true       # OIDN GPU mode (Blender 4.0+); ignored if denoiser != OPENIMAGEDENOISE
  adaptive_threshold: 0.05     # noise threshold for adaptive sampling (0 = disabled)
  resolution_x: 640
  resolution_y: 640
  save_blends: false           # set true to save .blend per frame (slow; for debugging only)

scene:
  objects_per_scene_min: 1       # kept for reference; per-class counts now control spawn
  objects_per_scene_max: 4
  per_class_min: 1               # min instances spawned per model category per image
  per_class_max: 9               # max instances spawned per model category per image (must be >= max grid rows*cols)
  distractors_min: 2
  distractors_max: 10
  distractor_primitive_size: 0.2  # diameter (meters) for spawned primitive occluders
  target_spread: 0.5              # fallback XY spread if Bounds empties not found
  max_placement_retries: 10       # retry attempts before accepting last position
  placement_margin: 0.0           # extra clearance in metres added to each AABB edge
  background_roughness_min: 0.15
  background_roughness_max: 1.0
  target_rotation_x_min: -22      # degrees — keep targets nearly upright
  target_rotation_x_max: 22       # degrees
  target_rotation_y_min: 65       # degrees — constrain targets to upright/on-side orientation
  target_rotation_y_max: 115      # degrees
  target_rotation_z_min: -24      # degrees
  target_rotation_z_max: 24       # degrees
  class_appearance_probability: 0.6  # chance each model class spawns per image (~17 objects avg with 6 classes)

  arrangements:
    enabled: true
    group_probability: 0.6        # chance each model class is placed as a group vs. solo
    grid_sizes:                   # [rows, cols, weight] — higher weight = sampled more often
      - [1, 1, 1]
      - [2, 2, 3]
      - [3, 3, 1]
    cell_spacing: 0.0             # extra gap in metres beyond flush contact (0 = meshes touching)
    group_placement_retries: 15   # collision avoidance retries for entire group
    rotate_as_unit: true          # rotate the whole group as one rigid cluster

camera:
  distance_min: 2.0
  distance_max: 3.5
  elevation_min_deg: 15
  elevation_max_deg: 75
  focal_length_min: 35
  focal_length_max: 55

lighting:
  radius_min: 2.0                # min distance from scene centre for light placement
  radius_max: 4.5                # max distance from scene centre for light placement
  intensity_min: 80
  intensity_max: 300
  color_temp_min: 4000
  color_temp_max: 15000

material:
  randomize_color: true
  randomize_roughness: true
  roughness_min: 0.05
  roughness_max: 0.95
  randomize_metallic: true
  use_texture_sets: true        # applies to distractors/primitives only; skipped for assets with embedded textures

assets:
  models:
    # KV-provided products
    - path: assets/models/
      glob: "cherry_coke.glb"
      category_id: 1
      category_name: cherry_coke
    - path: assets/models/
      glob: "coke.glb"
      category_id: 2
      category_name: coke
    - path: assets/models/
      glob: "coke_zero.glb"
      category_id: 3
      category_name: coke_zero
    - path: assets/models/
      glob: "diet_coke.glb"
      category_id: 4
      category_name: diet_coke
    - path: assets/models/
      glob: "fanta.glb"
      category_id: 5
      category_name: fanta
    - path: assets/models/
      glob: "sprite.glb"
      category_id: 6
      category_name: sprite
    # Custom models
    - path: assets/models/
      glob: "green_custom.glb"
      category_id: 7
      category_name: green_custom
    - path: assets/models/
      glob: "orange_custom.glb"
      category_id: 8
      category_name: orange_custom
    - path: assets/models/
      glob: "red_custom.glb"
      category_id: 9
      category_name: red_custom
  distractors:
    meshes: assets/distractors/
    use_primitives: true
  textures: assets/textures/    # used for distractors/primitives only
  backgrounds: assets/backgrounds/

output_dir: output/
num_images: 50
seed: 42
